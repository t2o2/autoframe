# Each container clones GIT_REPO_URL fresh into /workspace/repo and works
# entirely within that clone — host code is never mounted. Branches are pushed
# back to the remote; the host and container codebases never interfere.

x-agent-base: &agent-base
  build:
    context: .
    args:
      TARGETARCH: ${DOCKER_TARGETARCH:-arm64}
  platform: linux/${DOCKER_PLATFORM:-arm64}
  working_dir: /workspace/repo
  depends_on:
    - redis
  mem_limit: ${AGENT_MEM_LIMIT:-8g}
  memswap_limit: ${AGENT_MEMSWAP_LIMIT:-10g}
  env_file:
    - path: .env
      required: true
    - path: .env.project
      required: false
  volumes:
    - ${HOME}/.claude.json:/opt/host-claude.json:ro
    - ${HOME}/.claude:/opt/host-claude:ro
    - ${HOME}/.agents:/opt/host-agents:ro
    # - ${HOME}/.ssh:/home/agent/.ssh:ro
    - cargo_target:/cache/cargo_target
  environment:
    - GIT_REPO_URL
    - GIT_BASE_BRANCH
    - GITHUB_TOKEN
    - LINEAR_API_KEY
    - LINEAR_TEAM_KEY
    - ANTHROPIC_API_KEY
    - ANTHROPIC_BASE_URL
    - CLAUDE_CODE_OAUTH_TOKEN
    - OPENROUTER_API_KEY
    - OR_MODEL_NORMAL
    - OR_MODEL_ADVANCED
    - HOME=/home/agent
    - CARGO_TARGET_DIR=/cache/cargo_target
    - RUST_LOG=${RUST_LOG:-info}
    - REDIS_URL=redis://redis:6379
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
    - "cdn.growthbook.io:127.0.0.1"


services:
  # ── Claude agents ─────────────────────────────────────────────────────────────
  # Scale with: docker compose up --scale process=3 --profile process
  process:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-process.sh"]
    profiles: ["process", "all"]
    environment:
      - AGENT_TIER=normal

  review:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-review.sh"]
    profiles: ["review", "all"]
    environment:
      - AGENT_TIER=normal

  approve:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-approve.sh"]
    profiles: ["approve", "all"]
    environment:
      - AGENT_TIER=normal

  research:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-research.sh"]
    profiles: ["research", "all"]
    environment:
      - AGENT_TIER=normal

  plan:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-plan.sh"]
    profiles: ["plan", "all"]
    environment:
      - AGENT_TIER=normal

  # ── Shared infrastructure ─────────────────────────────────────────────────────
  # No profile — starts whenever any agent profile is active (via depends_on).
  # Persistence disabled: claims are ephemeral; a restart clears stale locks
  # and the stale-revert logic handles any in-flight tickets.
  redis:
    image: redis:7-alpine
    container_name: autoframe-redis
    restart: unless-stopped
    command: redis-server --appendonly no --save ""

volumes:
  cargo_target:
    name: autoframe_cargo_target
