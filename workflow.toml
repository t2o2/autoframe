[tracker]
type = "linear"
team = "${LINEAR_TEAM_KEY}"

[defaults]
agent = "${AGENT:-claude}"
timeout_silent_s = 1800
timeout_tracker_s = 3600
workspace_root = "/workspace/worktrees"

[dispatch]
order = ["priority", "age"]
concurrency = 2

[[stages]]
name          = "research"
poll          = ["Todo"]
claim         = "Todo"
done          = "Research Pending Approval"
revert        = "Todo"
command       = "/ticket-research"
pass_state    = ""
fail_state    = ""
lock_prefix   = "research"
stage_verb    = "researching"
watch_states  = ["Todo"]
stale_threshold_s        = 1800

[[stages]]
name          = "plan"
poll          = ["Planning"]
claim         = "Planning"
done          = "Plan Pending Approval"
revert        = "Planning"
command       = "/ticket-plan"
pass_state    = ""
fail_state    = ""
lock_prefix   = "plan"
stage_verb    = "planning"
watch_states  = ["Planning"]
stale_threshold_s        = 1800

[[stages]]
name          = "implement"
poll          = ["Implementation", "Changes Required"]
claim         = "Implementation"
done          = "Code Review"
revert        = "Implementation"
command       = "/ticket-implement"
pass_state    = ""
fail_state    = ""
lock_prefix   = "implement"
stage_verb    = "implementing"
watch_states  = ["Implementation", "Changes Required"]
stale_threshold_s        = 1800

[[stages]]
name          = "code-review"
poll          = ["Code Review"]
claim         = "Code Review"
done          = ""
revert        = "Code Review"
command       = "/ticket-code-review"
pass_state    = "Human Review"
fail_state    = "Changes Required"
lock_prefix   = "code-review"
stage_verb    = "reviewing"
watch_states  = ["Code Review"]
stale_threshold_s        = 1800

[[stages]]
name          = "retro"
poll          = ["Retrospective"]
claim         = "Retrospective"
done          = "Merge"
revert        = "Retrospective"
command       = "/ticket-retro"
pass_state    = ""
fail_state    = ""
lock_prefix   = "retro"
stage_verb    = "retrospecting"
watch_states  = ["Retrospective"]
stale_threshold_s        = 1800

[[stages]]
name          = "merge"
poll          = ["Merge"]
claim         = "Merge"
done          = "Done"
revert        = "Human Review"
command       = "/ticket-merge"
pass_state    = ""
fail_state    = ""
lock_prefix   = "merge"
stage_verb    = "merging"
watch_states  = ["Merge"]
stale_threshold_s        = 1800

[preamble]
text = """
"""
