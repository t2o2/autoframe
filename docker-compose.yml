# Each container clones GIT_REPO_URL fresh into /workspace/repo and works
# entirely within that clone — host code is never mounted. Branches are pushed
# back to the remote; the host and container codebases never interfere.

x-agent-base: &agent-base
  build:
    context: .
    args:
      TARGETARCH: ${DOCKER_TARGETARCH:-arm64}
  platform: linux/${DOCKER_PLATFORM:-arm64}
  working_dir: /workspace/repo
  privileged: true
  depends_on:
    - redis
  mem_limit: ${AGENT_MEM_LIMIT:-8g}
  memswap_limit: ${AGENT_MEMSWAP_LIMIT:-10g}
  env_file:
    - path: .env
      required: true
    - path: .env.project
      required: false
  volumes:
    - ${HOME}/.claude.json:/opt/host-claude.json:ro
    - ${HOME}/.claude:/opt/host-claude:ro
    - ${HOME}/.agents:/opt/host-agents:ro
    # - ${HOME}/.ssh:/home/agent/.ssh:ro
    - cargo_target:/cache/cargo_target
    - sccache:/cache/sccache
    - /var/lib/docker
  environment:
    - GIT_REPO_URL
    - GIT_BASE_BRANCH
    - GITHUB_TOKEN
    - LINEAR_API_KEY
    - LINEAR_TEAM_KEY
    - ANTHROPIC_API_KEY
    - ANTHROPIC_BASE_URL
    - CLAUDE_CODE_OAUTH_TOKEN
    - OPENROUTER_API_KEY
    - OR_MODEL_NORMAL
    - OR_MODEL_ADVANCED
    - HOME=/home/agent
    - CARGO_TARGET_DIR=/cache/cargo_target
    - RUST_LOG=${RUST_LOG:-info}
    - REDIS_URL=redis://redis:6379
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
    - "cdn.growthbook.io:127.0.0.1"

x-pi-base: &pi-base
  build:
    context: .
    dockerfile: Dockerfile.pi
    args:
      TARGETARCH: ${DOCKER_TARGETARCH:-arm64}
  platform: linux/${DOCKER_PLATFORM:-arm64}
  working_dir: /workspace/repo
  privileged: true
  depends_on:
    - redis
  mem_limit: ${AGENT_MEM_LIMIT:-8g}
  memswap_limit: ${AGENT_MEMSWAP_LIMIT:-10g}
  env_file:
    - path: .env
      required: true
    - path: .env.project
      required: false
  volumes:
    - ${HOME}/.pi/agent/auth.json:/opt/host-pi-auth.json:ro
    - ${HOME}/.pi/agent:/opt/host-pi:ro
    - cargo_target:/cache/cargo_target
    - sccache:/cache/sccache
    - /var/lib/docker
  environment:
    - GIT_REPO_URL
    - GIT_BASE_BRANCH
    - GITHUB_TOKEN
    - LINEAR_API_KEY
    - LINEAR_TEAM_KEY
    - AGENT_TIER=normal
    - HOME=/home/agent
    - CARGO_TARGET_DIR=/cache/cargo_target
    - RUST_LOG=${RUST_LOG:-info}
    - REDIS_URL=redis://redis:6379   # ask-human.sh Slack button relay
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
    - "cdn.growthbook.io:127.0.0.1"

services:
  # ── Claude agents ─────────────────────────────────────────────────────────────
  # Scale with: docker compose up --scale implement=3 --profile implement
  implement:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-implement.sh"]
    profiles: ["implement", "all"]
    environment:
      - AGENT_TIER=normal

  code-review:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-code-review.sh"]
    profiles: ["code-review", "all"]
    environment:
      - AGENT_TIER=advanced

  merge:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-merge.sh"]
    profiles: ["merge", "all"]
    environment:
      - AGENT_TIER=normal

  research:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-research.sh"]
    profiles: ["research", "all"]
    environment:
      - AGENT_TIER=normal

  plan:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-plan.sh"]
    profiles: ["plan", "all"]
    environment:
      - AGENT_TIER=advanced

  retro:
    <<: *agent-base
    command: ["./scripts/autonomous-agent-retro.sh"]
    profiles: ["retro", "all"]
    environment:
      - AGENT_TIER=normal

  # Slack ticket intake bot: polls a Slack channel, refines requests into Linear
  # tickets via Claude, and creates them when the user approves via Block Kit
  # buttons (Socket Mode delivers the click — no public Request URL needed).
  # Requires: SLACK_BOT_TOKEN, SLACK_APP_TOKEN (xapp-…), SLACK_TICKET_CHANNEL
  #           (or SLACK_CHANNEL), ANTHROPIC_API_KEY, LINEAR_API_KEY, LINEAR_TEAM_KEY.
  slack-listen:
    <<: *agent-base
    container_name: agent-slack-listen
    command: ["./scripts/autonomous-agent-slack-listen.sh"]
    profiles: ["slack-listen", "all"]

  # Spec-feedback loop (Claude variant): CHANGE-driven, not Linear-state-driven.
  # Polls GIT_BASE_BRANCH and, when new commits land, audits the docs/spec-map.yaml
  # areas whose files changed, files divergences as Backlog tickets (human promotes
  # to Todo to execute), and pings the feedback channel on new findings. Idles if
  # the target repo has no docs/spec-map.yaml. Knobs (SPEC_LOOP_POLL_INTERVAL_S,
  # SPEC_LOOP_AREAS, SPEC_LOOP_PUSH_REPORTS, SPEC_LOOP_CREATE_RUN_TICKET) come from
  # .env via env_file.
  spec-loop:
    <<: *agent-base
    container_name: agent-spec-loop
    command: ["./scripts/autonomous-agent-spec-loop.sh"]
    profiles: ["spec-loop", "all"]

  # ── Pi agents ─────────────────────────────────────────────────────────────────
  # Run all:  docker compose --profile all-pi up --build
  # Run one:  docker compose --profile implement-pi up --build

  implement-pi:
    <<: *pi-base
    container_name: agent-implement-pi
    command: ["./scripts/autonomous-agent-implement-pi.sh"]
    profiles: ["implement-pi", "all-pi"]
    restart: "no"

  research-pi:
    <<: *pi-base
    container_name: agent-research-pi
    command: ["./scripts/autonomous-agent-research-pi.sh"]
    profiles: ["research-pi", "all-pi"]

  plan-pi:
    <<: *pi-base
    container_name: agent-plan-pi
    command: ["./scripts/autonomous-agent-plan-pi.sh"]
    profiles: ["plan-pi", "all-pi"]

  code-review-pi:
    <<: *pi-base
    container_name: agent-code-review-pi
    command: ["./scripts/autonomous-agent-code-review-pi.sh"]
    profiles: ["code-review-pi", "all-pi"]

  merge-pi:
    <<: *pi-base
    container_name: agent-merge-pi
    command: ["./scripts/autonomous-agent-merge-pi.sh"]
    profiles: ["merge-pi", "all-pi"]

  retro-pi:
    <<: *pi-base
    container_name: agent-retro-pi
    command: ["./scripts/autonomous-agent-retro-pi.sh"]
    profiles: ["retro-pi", "all-pi"]

  # Spec-feedback loop: time-driven (nightly), not Linear-state-driven.
  # Audits implementation vs docs/ spec corpus on the target repo, files
  # divergences as Backlog tickets (human promotes to Todo to execute).
  # Spec-loop knobs (SPEC_LOOP_RUN_ON_START, SPEC_LOOP_INTERVAL_S,
  # SPEC_LOOP_AREAS, SPEC_LOOP_PUSH_REPORTS) are read from .env via env_file —
  # do NOT add an environment: block here, it would replace pi-base's list.
  spec-loop-pi:
    <<: *pi-base
    container_name: agent-spec-loop-pi
    command: ["./scripts/autonomous-agent-spec-loop-pi.sh"]
    profiles: ["spec-loop-pi", "all-pi"]

  # ── Fleet health monitor ──────────────────────────────────────────────────────
  # Watches the agent fleet from OUTSIDE (a wedged container can't watch itself)
  # and alerts a human via scripts/notify-human.sh on: full disk, crashed/looping
  # containers, hung poll loops, and livelocks (claiming nothing despite work —
  # the failure mode where a full disk makes every ticket look "locked").
  # Talks to the HOST docker daemon via the mounted socket so it can see all the
  # sibling agent containers. Alert credentials (SLACK_*/TELEGRAM_*) come from
  # .env via env_file. Tune via MONITOR_* knobs (see .env).
  monitor:
    image: docker:cli
    container_name: agent-monitor
    profiles: ["monitor", "all", "all-pi"]
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - CHECK_INTERVAL=${MONITOR_CHECK_INTERVAL:-120}
      - DISK_WARN_PCT=${MONITOR_DISK_WARN_PCT:-85}
      - LOG_WINDOW_MIN=${MONITOR_LOG_WINDOW_MIN:-15}
      - ALERT_REMIND_SECS=${MONITOR_ALERT_REMIND_SECS:-21600}
    volumes:
      # Read-only host docker socket: see/inspect sibling containers, never mutate.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts:/opt/monitor/scripts:ro
      - monitor_state:/var/lib/agent-monitor
    entrypoint: ["/bin/sh", "-c"]
    # docker:cli is Alpine: add bash + curl + jq for notify-human.sh and coreutils
    # for a GNU `date` that parses docker's RFC3339 --timestamps.
    command:
      - apk add --no-cache bash curl jq coreutils >/dev/null 2>&1 && exec bash /opt/monitor/scripts/monitor-agents.sh

  # ── Shared infrastructure ─────────────────────────────────────────────────────
  # No profile — starts whenever any agent profile is active (via depends_on).
  # Persistence disabled: claims are ephemeral; a restart clears stale locks
  # and the stale-revert logic handles any in-flight tickets.
  redis:
    image: redis:7-alpine
    container_name: autoframe-redis
    restart: unless-stopped
    command: redis-server --appendonly no --save ""

volumes:
  cargo_target:
    name: autoframe_cargo_target
  sccache:
    name: autoframe_sccache
  monitor_state:
    name: autoframe_monitor_state
